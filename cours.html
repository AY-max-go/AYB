<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCM - Trias, Jurassique, Crétacé & Cénozoïque | IEGS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2b5e3b 0%, #1b4a3b 50%, #0d3b2e 100%);
            position: relative;
            padding: 20px;
        }

        /* Vagues animées */
        .waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            z-index: 0;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 1000% 1000% 0 0;
            animation: wave 8s infinite linear;
        }

        .wave:nth-child(2) {
            bottom: 10px;
            opacity: 0.5;
            animation-delay: -2s;
            animation-duration: 10s;
        }

        .wave:nth-child(3) {
            bottom: 20px;
            opacity: 0.3;
            animation-delay: -4s;
            animation-duration: 12s;
        }

        @keyframes wave {
            0% { transform: translateX(0) translateY(0) scaleX(1); }
            50% { transform: translateX(-25%) translateY(5px) scaleX(1.2); }
            100% { transform: translateX(-50%) translateY(0) scaleX(1); }
        }

        /* Conteneur principal */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* En-tête */
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 1.8rem;
            color: #1b4a3b;
            margin-bottom: 10px;
        }

        .header h1 i {
            color: #ffd700;
            margin-right: 10px;
        }

        .header p {
            color: #666;
            font-size: 1rem;
        }

        .timeline-badge {
            display: inline-flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .timeline-badge span {
            background: #2b5e3b;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        /* Barre de progression */
        .progress-container {
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #2b5e3b, #ffd700);
            width: 0%;
            height: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: right;
            color: white;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* Question card */
        .question-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s ease;
        }

        .question-card:hover {
            transform: translateX(5px);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1b4a3b;
            margin-bottom: 15px;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .question-number {
            background: #2b5e3b;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 38px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .option:hover {
            background: rgba(43, 94, 59, 0.1);
        }

        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2b5e3b;
        }

        .option label {
            font-size: 0.95rem;
            color: #333;
            cursor: pointer;
            flex: 1;
        }

        /* Zone des résultats */
        .results-section {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2b5e3b, #1b4a3b);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .score-number {
            font-size: 3rem;
            font-weight: bold;
        }

        .score-total {
            font-size: 1rem;
            opacity: 0.8;
        }

        .feedback-message {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            border-radius: 50px;
        }

        .feedback-success {
            background: #d4edda;
            color: #155724;
        }

        .feedback-warning {
            background: #f8d7da;
            color: #721c24;
        }

        .feedback-excellent {
            background: #d1ecf1;
            color: #0c5460;
        }

        .btn-submit {
            background: linear-gradient(135deg, #2b5e3b, #1b4a3b);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-reset {
            background: #6c757d;
            margin-left: 15px;
        }

        .btn-reset:hover {
            background: #5a6268;
        }

        /* Correction détaillée */
        .correction-detail {
            margin-top: 30px;
            text-align: left;
            border-top: 2px dashed #ddd;
            padding-top: 20px;
        }

        .correction-title {
            font-size: 1.2rem;
            color: #1b4a3b;
            margin-bottom: 15px;
            cursor: pointer;
            display: inline-block;
        }

        .correction-list {
            display: none;
            margin-top: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .correction-list.show {
            display: block;
        }

        .correction-item {
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            background: #f5f5f5;
        }

        .correction-item.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }

        .correction-item.wrong {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }

        .correction-item .user-answer {
            font-weight: bold;
            color: #666;
        }

        /* Footer */
        .footer {
            background: rgba(27, 74, 59, 0.95);
            color: white;
            padding: 20px 0;
            text-align: center;
            border-radius: 15px;
            margin-top: 30px;
        }

        .author {
            font-size: 1rem;
            background: linear-gradient(45deg, #ffd700, #2b5e3b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .options {
                padding-left: 0;
            }
            
            .question-text {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 1.3rem;
            }
            
            .feedback-message {
                font-size: 1.1rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="waves">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="container">
        <!-- En-tête -->
        <div class="header">
            <h1><i class="fas fa-dragon"></i> QCM : Trias, Jurassique, Crétacé & Cénozoïque</h1>
            <p><i class="fas fa-map-marked-alt"></i> Géologie du Maroc - Mésozoïque & Cénozoïque | 20 questions</p>
            <div class="timeline-badge">
                <span><i class="fas fa-skull"></i> Trias (252-201 Ma)</span>
                <span><i class="fas fa-dinosaur"></i> Jurassique (201-145 Ma)</span>
                <span><i class="fas fa-fish"></i> Crétacé (145-66 Ma)</span>
                <span><i class="fas fa-mammoth"></i> Cénozoïque (66 Ma - présent)</span>
            </div>
        </div>

        <!-- Barre de progression -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">0/20 questions répondues</div>

        <!-- Formulaire QCM -->
        <form id="qcmForm"></form>

        <!-- Section des résultats -->
        <div class="results-section" id="resultsSection" style="display: none;">
            <div class="score-circle">
                <div class="score-number" id="scoreNumber">0</div>
                <div class="score-total">/20</div>
            </div>
            <div class="feedback-message" id="feedbackMessage"></div>
            <button class="btn-submit" id="showCorrectionBtn">
                <i class="fas fa-eye"></i> Voir la correction détaillée
            </button>
            <button class="btn-submit btn-reset" id="resetBtn">
                <i class="fas fa-redo"></i> Recommencer
            </button>
            
            <div class="correction-detail" id="correctionDetail">
                <div class="correction-title" id="toggleCorrection">
                    <i class="fas fa-chevron-down"></i> Correction détaillée
                </div>
                <div class="correction-list" id="correctionList"></div>
            </div>
        </div>

        <button class="btn-submit" id="submitBtn" style="width: 100%;">
            <i class="fas fa-check-circle"></i> Corriger mon QCM
        </button>

        <!-- Footer -->
        <div class="footer">
            <div class="author">
                <i class="fas fa-code"></i> By AYOUB ESSABIRI 
                <i class="fas fa-heart" style="color: #ff6b6b;"></i> | IEGS - Géologie & Eau
            </div>
        </div>
    </div>

    <script>
        // Questions et réponses (uniquement Trias, Jurassique, Crétacé, Cénozoïque)
        const questions = [
            { text: "Le Cénozoïque, appelé \"l'âge des mammifères\", englobe :", options: ["A) Le Trias et le Jurassique", "B) Le Crétacé et le Paléogène", "C) Le Tertiaire et le Quaternaire", "D) Le Paléogène et le Néogène uniquement"], correct: "C" },
            { text: "D'après le document, l'apparition d'Homo sapiens au Maroc est datée d'environ :", options: ["A) 2 millions d'années", "B) 65 millions d'années", "C) 300 000 ans", "D) 10 000 ans"], correct: "C" },
            { text: "La crise de salinité messinienne, qui a provoqué l'assèchement quasi-complet de la Méditerranée, s'est produite il y a environ :", options: ["A) 23 Ma", "B) 6 Ma", "C) 65 Ma", "D) 250 Ma"], correct: "B" },
            { text: "Au Quaternaire du Maroc atlantique (Doukkala, Chaouia), le cycle marin Ouljien correspond au stade :", options: ["A) Sicilien", "B) Tyrrhénien", "C) Calabrien", "D) Versilien"], correct: "B" },
            { text: "La dislocation de la Pangée commence au Trias, conduisant à la formation de :", options: ["A) La Téthys uniquement", "B) La Laurasia au nord et le Gondwana au sud", "C) L'océan Pacifique", "D) La chaîne hercynienne"], correct: "B" },
            { text: "Au Maroc, la trilogie classique du Trias associe de la base au sommet :", options: ["A) Calcaires, marnes et grès", "B) Grès fins, calcaires récifaux et évaporites", "C) Conglomérats/grès rouges, basaltes/dolérites, évaporites", "D) Flyschs, olistostromes et radiolarites"], correct: "C" },
            { text: "Les bassins triasiques marocains (ex. Argana, Haut Atlas) sont des bassins de type 'pull-apart' contrôlés par :", options: ["A) Des failles normales héritées de l'orogenèse hercynienne", "B) Des plis de type 'ridge'", "C) Des diapirs de sel", "D) Des dépôts glaciaires"], correct: "A" },
            { text: "Au Jurassique, la structuration du Haut Atlas en 'rides' et 'dépotcentres' résulte :", options: ["A) D'une compression intense", "B) D'une tectonique distensive en blocs basculés", "C) D'un volcanisme explosif", "D) D'une érosion glaciaire"], correct: "B" },
            { text: "Dans le Haut Atlas central, le 'Calcaire corniche' caractéristique se dépose au :", options: ["A) Lias inférieur", "B) Bajocien supérieur", "C) Malm (Jurassique supérieur)", "D) Tithonique"], correct: "B" },
            { text: "Au Crétacé inférieur (Néocomien à Albien), la plus grande partie du Maroc est le siège :", options: ["A) D'une transgression marine généralisée", "B) D'une sédimentation détritique rouge continentale (érosion des reliefs jurassiques)", "C) D'un épais dépôt de phosphates", "D) D'un volcanisme de type trapps"], correct: "B" },
            { text: "La grande transgression marine du Cénomano-Turonien est marquée par le dépôt :", options: ["A) Des argilites noires à graptolites", "B) Des grès de l'Oukaimeden", "C) De la dalle turonienne (calcaires blancs à ammonites)", "D) Des basaltes en coussins"], correct: "C" },
            { text: "Les principaux gisements de phosphates marocains (Khouribga, Youssoufia) se sont formés au :", options: ["A) Trias", "B) Jurassique supérieur", "C) Maastrichtien à Éocène inférieur", "D) Miocène"], correct: "C" },
            { text: "Dans le bassin de Tarfaya, le Crétacé inférieur est caractérisé par :", options: ["A) Un épais prisme détritique (4 000 m)", "B) Des récifs coralliens géants", "C) Des évaporites massives", "D) Des calcaires lithographiques"], correct: "A" },
            { text: "Au Cénozoïque, dans la région de Toundoute (Haut Atlas), la formation de Kandoula montre des dépôts :", options: ["A) Uniquement marins profonds", "B) De cônes alluviaux, argilites, calcaires bitumineux et conglomérats (environnements continental à lagunaire)", "C) De flyschs turbiditiques", "D) De tillites glaciaires"], correct: "B" },
            { text: "Au Miocène, dans le bassin de Rabat, les 'marnes bleues du Bouregreg' sont attribuées à l'étage :", options: ["A) Tortonien", "B) Helvétien (Miocène moyen)", "C) Messinien", "D) Aquitanien"], correct: "B" },
            { text: "La 'Nappe numidienne' du Rif est un flysch principalement gréseux daté de l' :", options: ["A) Éocène", "B) Oligocène-Miocène inférieur", "C) Crétacé supérieur", "D) Pliocène"], correct: "B" },
            { text: "Au Quaternaire continental du Maroc, le cycle du Soltanien correspond au stade glaciaire alpin :", options: ["A) Günz", "B) Mindel", "C) Riss", "D) Würm"], correct: "D" },
            { text: "Dans le Haut Atlas occidental, la série du Lias est essentiellement :", options: ["A) Détritique rouge", "B) Dolomitique (carbonatée)", "C) Évaporitique", "D) Volcanique"], correct: "B" },
            { text: "Au Maroc, le Jurassique supérieur (Malm) est souvent :", options: ["A) Très épais (plus de 1000 m) dans tout le pays", "B) Absent ou lacunaire en raison d'une émersion généralisée dans les zones atlasiques", "C) Uniquement marin profond", "D) Représenté par des charbons"], correct: "B" },
            { text: "La reconnexion entre la Méditerranée et l'Atlantique à la fin du Messinien s'est faite par :", options: ["A) Le détroit de Sicile", "B) L'ouverture de l'isthme de Gibraltar", "C) Le corridor sud-rifain", "D) La vallée du Nil"], correct: "B" }
        ];

        // Générer le formulaire
        const formContainer = document.getElementById('qcmForm');
        
        questions.forEach((q, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-card';
            questionDiv.id = `q${index}`;
            
            let optionsHtml = '';
            q.options.forEach(opt => {
                const letter = opt.charAt(0);
                optionsHtml += `
                    <div class="option">
                        <input type="radio" name="q${index}" value="${letter}" id="q${index}_${letter}">
                        <label for="q${index}_${letter}">${opt}</label>
                    </div>
                `;
            });
            
            questionDiv.innerHTML = `
                <div class="question-text">
                    <span class="question-number">${index + 1}</span>
                    <span>${q.text}</span>
                </div>
                <div class="options">
                    ${optionsHtml}
                </div>
            `;
            
            formContainer.appendChild(questionDiv);
        });

        // Mettre à jour la barre de progression
        function updateProgress() {
            let answered = 0;
            for (let i = 0; i < questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected) answered++;
            }
            const percent = (answered / questions.length) * 100;
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = `${answered}/${questions.length} questions répondues`;
        }

        // Écouter les changements sur tous les radios
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', updateProgress);
        });

        // Correction
        document.getElementById('submitBtn').addEventListener('click', function() {
            let score = 0;
            const userAnswers = [];
            
            for (let i = 0; i < questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnswer = selected ? selected.value : null;
                userAnswers.push(userAnswer);
                if (userAnswer === questions[i].correct) {
                    score++;
                }
            }
            
            // Afficher les résultats
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('scoreNumber').innerHTML = score;
            
            const feedbackDiv = document.getElementById('feedbackMessage');
            if (score < 12) {
                feedbackDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Va réviser ton cours ! <i class="fas fa-book"></i>';
                feedbackDiv.className = 'feedback-message feedback-warning';
            } else if (score >= 12 && score < 16) {
                feedbackDiv.innerHTML = '<i class="fas fa-thumbs-up"></i> Bon travail ! Mais tu peux encore t\'améliorer. <i class="fas fa-graduation-cap"></i>';
                feedbackDiv.className = 'feedback-message feedback-success';
            } else {
                feedbackDiv.innerHTML = '<i class="fas fa-trophy"></i> Excellent ! Tu maîtrises parfaitement le sujet ! <i class="fas fa-star"></i>';
                feedbackDiv.className = 'feedback-message feedback-excellent';
            }
            
            // Générer la correction détaillée
            const correctionList = document.getElementById('correctionList');
            correctionList.innerHTML = '';
            
            questions.forEach((q, i) => {
                const userAnswer = userAnswers[i];
                const isCorrect = userAnswer === q.correct;
                const correctLetter = q.correct;
                const correctText = q.options.find(opt => opt.startsWith(correctLetter));
                const userLetter = userAnswer ? userAnswer : "Non répondue";
                const userText = userAnswer ? q.options.find(opt => opt.startsWith(userAnswer)) : "Aucune réponse sélectionnée";
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `correction-item ${isCorrect ? 'correct' : 'wrong'}`;
                itemDiv.innerHTML = `
                    <strong>Question ${i+1}:</strong> ${q.text}<br>
                    <span class="user-answer">📌 Votre réponse: ${userLetter}. ${userText || ''}</span><br>
                    <strong>✅ Réponse correcte: ${correctLetter}. ${correctText}</strong>
                `;
                correctionList.appendChild(itemDiv);
            });
            
            // Désactiver le bouton submit
            document.getElementById('submitBtn').style.display = 'none';
            
            // Faire défiler vers les résultats
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        });
        
        // Reset
        document.getElementById('resetBtn').addEventListener('click', function() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.checked = false;
            });
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
            updateProgress();
        });
        
        // Afficher/masquer la correction
        document.getElementById('toggleCorrection').addEventListener('click', function() {
            const correctionList = document.getElementById('correctionList');
            correctionList.classList.toggle('show');
            const icon = this.querySelector('i');
            if (correctionList.classList.contains('show')) {
                icon.className = 'fas fa-chevron-up';
            } else {
                icon.className = 'fas fa-chevron-down';
            }
        });
        
        // Initialiser la progression
        updateProgress();
    </script>
</body>
</html>
